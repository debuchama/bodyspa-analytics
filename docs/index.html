<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BODY SPA Analytics | セラピスト統計ダッシュボード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--bg4:#22223a;
  --text:#e8e6f0;--text2:#a09cb0;--text3:#6d6880;
  --accent:#c9a87c;--accent2:#e8c898;--accent3:#a08050;
  --pink:#d4638f;--blue:#5b8def;--green:#5cd4a0;--red:#e85b6f;--purple:#9b7bd4;
  --card-radius:16px;--shadow:0 8px 32px rgba(0,0,0,.4);
}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}

/* Header */
.header{background:linear-gradient(135deg,#0d0d14 0%,#1a1428 50%,#0d0d14 100%);border-bottom:1px solid rgba(201,168,124,.15);padding:24px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo h1{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--accent)}
.logo span{font-size:12px;color:var(--text3);letter-spacing:1px}
.header-meta{font-size:11px;color:var(--text3);text-align:right}
.header-meta .mono{color:var(--accent);font-size:12px}

/* Stats Overview */
.overview{max-width:1400px;margin:32px auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.stat-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--card-radius);padding:20px;text-align:center;transition:transform .2s,border-color .3s}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(201,168,124,.2)}
.stat-card .num{font-size:36px;font-weight:700;color:var(--accent);display:block}
.stat-card .label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* Tabs */
.tabs{max-width:1400px;margin:32px auto 0;padding:0 24px;display:flex;gap:4px;border-bottom:1px solid rgba(255,255,255,.06);overflow-x:auto}
.tab{padding:12px 24px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Content */
.content{max-width:1400px;margin:0 auto;padding:24px}
.panel{display:none}
.panel.active{display:block}

/* Filter */
.filter-bar{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}

/* Therapist Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--card-radius);overflow:hidden;transition:all .3s}
.card:hover{border-color:rgba(201,168,124,.25);box-shadow:var(--shadow)}
.card-top{display:flex;gap:16px;padding:20px}
.card-img{width:90px;height:120px;border-radius:12px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px}
.card-store{font-size:12px;color:var(--accent);margin-bottom:8px}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.badge-new{background:rgba(232,91,111,.15);color:var(--red)}
.badge-en{background:rgba(91,141,239,.15);color:var(--blue)}
.badge-freq{background:rgba(92,212,160,.15);color:var(--green)}
.card-desc{font-size:11px;color:var(--text3);line-height:1.5;max-height:44px;overflow:hidden;text-overflow:ellipsis}
.card-stats{padding:0 20px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card-stat{text-align:center}
.card-stat .v{font-size:20px;font-weight:700;color:var(--text)}
.card-stat .l{font-size:10px;color:var(--text3)}

/* Weekday Heatmap */
.card-heatmap{padding:0 20px 16px}
.heatmap-row{display:flex;gap:3px;align-items:center}
.heatmap-label{font-size:10px;color:var(--text3);width:16px;text-align:center}
.heatmap-cell{flex:1;height:20px;border-radius:3px;transition:all .2s;position:relative}
.heatmap-cell:hover{transform:scaleY(1.3)}

/* Shift info */
.card-shift{padding:0 20px 16px;display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}
.card-shift .val{color:var(--text);font-weight:500}

/* Schedule table */
.schedule-section{margin-top:32px}
.schedule-section h3{font-size:16px;color:var(--accent);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.schedule-note{color:var(--text3);font-size:12px;font-weight:400}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 12px;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.08)}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
tr:hover td{background:rgba(201,168,124,.03)}

/* Ranking */
.ranking{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.rank-card{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--card-radius);padding:20px}
.rank-card h4{font-size:14px;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.rank-item{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.rank-pos{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#c9a87c,#e8c898);color:#0a0a0f}
.rank-2{background:rgba(192,192,192,.2);color:#ccc}
.rank-3{background:rgba(180,130,80,.2);color:#c9a87c}
.rank-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.rank-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.rank-name{font-size:12px;min-width:100px}
.rank-val{font-size:12px;color:var(--text2);min-width:40px;text-align:right}

/* Monthly Chart */
.chart-container{background:var(--bg2);border:1px solid rgba(255,255,255,.06);border-radius:var(--card-radius);padding:20px;margin-bottom:20px}
.chart-title{font-size:14px;color:var(--accent);margin-bottom:16px}
.bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px;padding-top:20px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .6s ease;min-height:2px;cursor:pointer}
.bar:hover{opacity:.8}
.bar-label{font-size:9px;color:var(--text3);writing-mode:vertical-rl;white-space:nowrap}
.bar-val{font-size:10px;color:var(--text2)}

/* Responsive */
@media(max-width:768px){
  .cards{grid-template-columns:1fr}
  .overview{grid-template-columns:repeat(2,1fr)}
  .header-inner{flex-direction:column;align-items:flex-start}
  .ranking{grid-template-columns:1fr}
}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card,.stat-card,.rank-card,.chart-container{animation:fadeUp .5s ease both}
.card:nth-child(n){animation-delay:calc(var(--i,0)*.05s)}
</style>
</head>

document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
  };
});

// Store filter
const allStores = [...new Set(DATA.therapists.map(t=>t.store))].filter(s=>s!=='本部');
let currentStore = '全て';
function renderStoreFilter(){
  document.getElementById('storeFilter').innerHTML = ['全て',...allStores].map(s=>
    `<button class="filter-btn ${s===currentStore?'active':''}" onclick="filterStore('${s}')">${s}</button>`
  ).join('');
}
function filterStore(store){
  currentStore=store;
  renderStoreFilter();
  renderCards();
}
renderStoreFilter();

// Heatmap color
function heatColor(val,max){
  if(max===0)return 'rgba(255,255,255,.03)';
  const r=val/max;
  if(r===0)return 'rgba(255,255,255,.03)';
  if(r<.25)return 'rgba(201,168,124,.15)';
  if(r<.5)return 'rgba(201,168,124,.3)';
  if(r<.75)return 'rgba(201,168,124,.5)';
  return 'rgba(201,168,124,.75)';
}

// Cards
function renderCards(){
  const filtered = currentStore==='全て' ? DATA.therapists : DATA.therapists.filter(t=>t.store===currentStore);
  document.getElementById('therapistCards').innerHTML = filtered.map((t,i)=>{
    const maxWd = Math.max(...t.weekday_dist,1);
    const heatmap = t.weekday_dist.map((v,di)=>
      `<div class="heatmap-cell" style="background:${heatColor(v,maxWd)}" title="${DAY_JP[di]}: ${v}日"></div>`
    ).join('');
    const labels = DAY_JP.map(d=>`<span class="heatmap-label">${d}</span>`).join('');
    
    const badges = [];
    if(t.new) badges.push('<span class="badge badge-new">🆕 NEW</span>');
    if(t.english) badges.push('<span class="badge badge-en">🌐 EN</span>');
    if(t.freq_per_week>=4) badges.push('<span class="badge badge-freq">⚡ 常連</span>');
    
    return `<div class="card" style="--i:${i}">
      <div class="card-top">
        ${t.image ? `<img class="card-img" src="${t.image}" alt="${t.name}" loading="lazy">` : '<div class="card-img"></div>'}
        <div class="card-info">
          <div class="card-name">${t.name}</div>
          <div class="card-store">${t.store} ${t.stores_worked.length>1?'(+他店舗)':''}</div>
          <div class="card-badges">${badges.join('')}</div>
          <div class="card-desc">${t.description.replace(/\n/g,' ')}</div>
        </div>
      </div>
      <div class="card-stats">
        <div class="card-stat"><span class="v">${t.total_days}</span><span class="l">出勤日数</span></div>
        <div class="card-stat"><span class="v">${t.avg_hours}h</span><span class="l">平均勤務</span></div>
        <div class="card-stat"><span class="v">${t.freq_per_week}/w</span><span class="l">週あたり</span></div>
      </div>
      <div class="card-heatmap">
        <div class="heatmap-row">${labels}</div>
        <div class="heatmap-row" style="margin-top:4px">${heatmap}</div>
      </div>
      <div class="card-shift">
        <div>典型シフト: <span class="val">${t.typical_shift||'—'}</span></div>
        <div>入店: <span class="val">${t.enroll_date||'不明'}</span></div>
      </div>
    </div>`;
  }).join('');
}
renderCards();

// Rankings
function renderRankings(){
  const panel = document.getElementById('panel-ranking');
  
  const rankings = [
    {title:'📊 出勤日数 TOP10',key:'total_days',suffix:'日',color:'var(--accent)'},
    {title:'⏰ 平均勤務時間 TOP10',key:'avg_hours',suffix:'h',color:'var(--blue)'},
    {title:'🔥 出勤頻度 TOP10 (回/週)',key:'freq_per_week',suffix:'/w',color:'var(--green)'},
  ];
  
  const active = DATA.therapists.filter(t=>t.total_days>5);
  
  panel.innerHTML = '<div class="ranking">' + rankings.map(r=>{
    const sorted = [...active].sort((a,b)=>b[r.key]-a[r.key]).slice(0,10);
    const max = sorted[0]?.[r.key]||1;
    return `<div class="rank-card"><h4>${r.title}</h4>` + sorted.map((t,i)=>
      `<div class="rank-item">
        <div class="rank-pos ${i<3?'rank-'+(i+1):''}" style="${i>=3?'background:var(--bg3);color:var(--text3)':''}">${i+1}</div>
        <span class="rank-name">${t.name.split(' ')[0]}</span>
        <div class="rank-bar"><div class="rank-bar-fill" style="width:${(t[r.key]/max*100).toFixed(0)}%;background:${r.color}"></div></div>
        <span class="rank-val mono">${typeof t[r.key]==='number'?t[r.key].toFixed?.(1)??t[r.key]:t[r.key]}${r.suffix}</span>
      </div>`
    ).join('') + '</div>';
  }).join('') + '</div>';

  // 曜日別ランキング
  panel.innerHTML += '<h3 style="color:var(--accent);margin:32px 0 16px;font-size:16px">📅 曜日別 出勤回数ヒートマップ</h3>';
  const tbl = active.sort((a,b)=>b.total_days-a.total_days).slice(0,15);
  const globalMax = Math.max(...tbl.flatMap(t=>t.weekday_dist));
  panel.innerHTML += `<div class="chart-container"><table><thead><tr><th>セラピスト</th><th>店舗</th>${DAY_JP.map(d=>'<th style="text-align:center">'+d+'</th>').join('')}<th style="text-align:right">合計</th></tr></thead><tbody>` +
    tbl.map(t=>`<tr><td style="font-weight:500">${t.name.split(' ')[0]}</td><td style="color:var(--text3);font-size:12px">${t.store}</td>${t.weekday_dist.map(v=>{
      const bg = heatColor(v,globalMax);
      return `<td style="text-align:center"><span style="display:inline-block;width:32px;height:24px;line-height:24px;border-radius:4px;background:${bg};font-size:11px;color:var(--text)">${v||''}</span></td>`;
    }).join('')}<td style="text-align:right;font-weight:700;color:var(--accent)">${t.total_days}</td></tr>`).join('') +
    '</tbody></table></div>';
}
renderRankings();

// Schedule (4/18 week)
function renderSchedule(){
  const panel = document.getElementById('panel-schedule');
  const week = DATA.week_apr18;
  const dates = Object.keys(week).sort();
  
  if(dates.length===0){
    panel.innerHTML = `<div class="chart-container">
      <h3 style="color:var(--accent);margin-bottom:12px">📅 4月18日(土)の週スケジュール</h3>
      <p style="color:var(--text3)">4/18の週のスケジュールはまだ公開されていません。</p>
      <p style="color:var(--text3);margin-top:8px">通常、数日前にスケジュールが公開されます。このダッシュボードを再生成することで最新情報を確認できます。</p>
      <p style="color:var(--accent);margin-top:16px;font-size:13px">📌 現在公開済み: 〜4/15まで (${Object.values(week).flat().length}件)</p>
    </div>`;
  } else {
    panel.innerHTML = `<div class="chart-container">
      <h3 style="color:var(--accent);margin-bottom:12px">📅 公開済みスケジュール</h3>
      <table><thead><tr><th>日付</th><th>セラピスト</th><th>店舗</th><th>時間</th></tr></thead><tbody>` +
      dates.flatMap(d=>week[d].map(s=>`<tr><td class="mono">${d}</td><td style="font-weight:500">${s.name}</td><td style="color:var(--text3)">${s.store}</td><td class="mono">${s.from}〜${s.to}</td></tr>`)).join('') +
      '</tbody></table></div>';
  }

  // 予測: 過去の土曜出勤パターンから4/18(土)を予測
  panel.innerHTML += `<div class="chart-container">
    <h4 style="color:var(--accent);margin-bottom:12px">🔮 4/18(土) 出勤予測 — 過去の土曜出勤率から推定</h4>
    <table><thead><tr><th>#</th><th>セラピスト</th><th>店舗</th><th>土曜出勤率</th><th>土曜出勤数</th><th>予測</th></tr></thead><tbody>` +
    DATA.therapists
      .filter(t=>t.total_days>10)
      .map(t=>({...t, satRate: t.weekday_dist[5]/Math.max(1,t.total_days)*100, satCount: t.weekday_dist[5]}))
      .sort((a,b)=>b.satRate-a.satRate)
      .map((t,i)=>{
        const conf = t.satRate >= 20 ? '🟢 高' : t.satRate >= 10 ? '🟡 中' : '⚪ 低';
        return `<tr><td>${i+1}</td><td style="font-weight:500">${t.name.split(' ')[0]}</td><td style="color:var(--text3)">${t.store}</td><td class="mono">${t.satRate.toFixed(1)}%</td><td class="mono">${t.satCount}回</td><td>${conf}</td></tr>`;
      }).join('') +
    '</tbody></table></div>';
}
renderSchedule();

// Monthly Trends
function renderMonthly(){
  const panel = document.getElementById('panel-monthly');
  
  // 全体月別
  const monthTotals = {};
  DATA.therapists.forEach(t=>{
    Object.entries(t.monthly||{}).forEach(([m,c])=>{
      monthTotals[m] = (monthTotals[m]||0) + c;
    });
  });
  const months = Object.keys(monthTotals).sort();
  const maxMonth = Math.max(...Object.values(monthTotals));
  
  panel.innerHTML = `<div class="chart-container">
    <div class="chart-title">📊 月別 全体出勤件数</div>
    <div class="bar-chart">${months.map(m=>{
      const v = monthTotals[m];
      const h = (v/maxMonth*140).toFixed(0);
      return `<div class="bar-col"><span class="bar-val mono">${v}</span><div class="bar" style="height:${h}px;background:linear-gradient(180deg,var(--accent),var(--accent3))"></div><span class="bar-label">${m.slice(5)}</span></div>`;
    }).join('')}</div>
  </div>`;

  // 店舗別月別
  const storeMonthly = {};
  const colors = {'新橋店':'var(--blue)','千葉本店':'var(--accent)','西葛西店':'var(--green)','本部':'var(--purple)'};
  DATA.therapists.forEach(t=>{
    if(!storeMonthly[t.store]) storeMonthly[t.store]={};
    Object.entries(t.monthly||{}).forEach(([m,c])=>{
      storeMonthly[t.store][m] = (storeMonthly[t.store][m]||0) + c;
    });
  });
  
  Object.entries(storeMonthly).filter(([s])=>s!=='本部').forEach(([store,data])=>{
    const max = Math.max(...Object.values(data),1);
    panel.innerHTML += `<div class="chart-container">
      <div class="chart-title" style="color:${colors[store]||'var(--text)'}">${store}</div>
      <div class="bar-chart">${months.map(m=>{
        const v = data[m]||0;
        const h = (v/max*120).toFixed(0);
        return `<div class="bar-col"><span class="bar-val mono">${v||''}</span><div class="bar" style="height:${h}px;background:${colors[store]||'var(--accent)'}"></div><span class="bar-label">${m.slice(5)}</span></div>`;
      }).join('')}</div>
    </div>`;
  });

  // セラピスト別 出勤推移（上位10名）
  const top10 = DATA.therapists.filter(t=>t.total_days>20).slice(0,10);
  panel.innerHTML += `<div class="chart-container">
    <div class="chart-title">👤 セラピスト別 月間出勤推移（上位10名）</div>
    <table><thead><tr><th>セラピスト</th>${months.map(m=>'<th style="text-align:center;font-size:10px">'+m.slice(5)+'</th>').join('')}<th style="text-align:right">合計</th></tr></thead><tbody>` +
    top10.map(t=>`<tr><td style="font-weight:500;white-space:nowrap">${t.name.split(' ')[0]}</td>${months.map(m=>{
      const v = (t.monthly||{})[m]||0;
      const max = Math.max(...Object.values(t.monthly||{}),1);
      return `<td style="text-align:center"><span style="display:inline-block;min-width:24px;padding:2px 4px;border-radius:4px;background:${heatColor(v,max)};font-size:11px">${v||''}</span></td>`;
    }).join('')}<td style="text-align:right;font-weight:700;color:var(--accent)">${t.total_days}</td></tr>`).join('') +
    '</tbody></table></div>';
}
renderMonthly();
</script>
