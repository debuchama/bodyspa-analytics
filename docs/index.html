<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BODY SPA Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080e;--bg2:#0f0f18;--bg3:#161624;--bg4:#1e1e32;
  --text:#eae8f2;--text2:#a8a4b8;--text3:#6a6580;
  --gold:#c9a87c;--gold2:#e8c898;--gold3:#9a7850;
  --pink:#d4638f;--blue:#5b8def;--green:#5cd4a0;--red:#e85b6f;--purple:#9b7bd4;--orange:#e8a040;
  --radius:14px;--shadow:0 8px 32px rgba(0,0,0,.5);
  --glass:rgba(255,255,255,.03);
}
body{font-family:'Outfit','Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace;font-size:.9em}
a{color:var(--gold);text-decoration:none}
a:hover{color:var(--gold2)}

/* === HEADER === */
.header{background:linear-gradient(135deg,rgba(12,12,18,.95),rgba(26,20,40,.95));border-bottom:1px solid rgba(201,168,124,.12);padding:16px 0;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.header-inner{max-width:1440px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.logo-area{display:flex;align-items:baseline;gap:10px}
.logo-area h1{font-size:18px;font-weight:700;letter-spacing:3px;color:var(--gold);font-family:'Outfit',sans-serif}
.logo-area .sub{font-size:10px;color:var(--text3);letter-spacing:2px;text-transform:uppercase}
.header-r{font-size:10px;color:var(--text3);text-align:right;display:flex;gap:16px;align-items:center}
.header-r .mono{color:var(--gold);font-size:11px}
.target-badge{background:linear-gradient(135deg,var(--gold3),var(--gold));color:var(--bg);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:1px}

/* === OVERVIEW STATS === */
.overview{max-width:1440px;margin:24px auto;padding:0 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}
.stat{background:var(--bg2);border:1px solid var(--glass);border-radius:var(--radius);padding:16px;text-align:center;transition:all .25s}
.stat:hover{border-color:rgba(201,168,124,.15);transform:translateY(-1px)}
.stat .n{font-size:32px;font-weight:700;color:var(--gold);display:block;font-family:'Outfit'}
.stat .l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;margin-top:2px}

/* === TABS === */
.tabs{max-width:1440px;margin:24px auto 0;padding:0 24px;display:flex;gap:2px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:10px 20px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;user-select:none}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-line{max-width:1440px;margin:0 auto;padding:0 24px;border-bottom:1px solid rgba(255,255,255,.04)}

/* === CONTENT === */
.content{max-width:1440px;margin:0 auto;padding:20px 24px 60px}
.panel{display:none}.panel.active{display:block}
.section-title{font-size:15px;color:var(--gold);margin:24px 0 12px;font-weight:600;letter-spacing:.5px}
.section-title:first-child{margin-top:0}

/* === FILTER === */
.filter-bar{display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap}
.fbtn{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.08);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;font-family:inherit;transition:all .2s}
.fbtn:hover,.fbtn.on{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* === CARDS === */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.card{background:var(--bg2);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);overflow:hidden;transition:all .3s}
.card:hover{border-color:rgba(201,168,124,.2);box-shadow:var(--shadow)}
.c-top{display:flex;gap:14px;padding:16px}
.c-img{width:80px;height:107px;border-radius:10px;object-fit:cover;background:var(--bg3);flex-shrink:0}
.c-info{flex:1;min-width:0}
.c-name{font-size:16px;font-weight:600}
.c-store{font-size:11px;color:var(--gold);margin:2px 0 6px}
.c-badges{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.bdg{padding:1px 7px;border-radius:8px;font-size:9px;font-weight:500}
.bdg-new{background:rgba(232,91,111,.12);color:var(--red)}
.bdg-en{background:rgba(91,141,239,.12);color:var(--blue)}
.bdg-hot{background:rgba(92,212,160,.12);color:var(--green)}
.c-desc{font-size:10px;color:var(--text3);line-height:1.5;max-height:30px;overflow:hidden}
.c-stats{padding:0 16px 12px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.cs{text-align:center}.cs .v{font-size:18px;font-weight:700}.cs .l{font-size:9px;color:var(--text3)}
.c-heat{padding:0 16px 10px}
.heat-row{display:flex;gap:2px;align-items:center}
.heat-lbl{font-size:9px;color:var(--text3);width:14px;text-align:center}
.heat-cell{flex:1;height:18px;border-radius:3px;cursor:default;position:relative}
.heat-cell:hover::after{content:attr(data-tip);position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--bg);color:var(--text);font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;border:1px solid var(--gold3)}
.c-foot{padding:0 16px 12px;display:flex;justify-content:space-between;font-size:10px;color:var(--text3)}
.c-foot .val{color:var(--text2);font-weight:500}

/* === TABLES === */
.tbl-wrap{background:var(--bg2);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
.tbl-wrap h4{padding:14px 16px 0;font-size:13px;color:var(--gold);font-weight:600}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 12px;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.06)}
td{padding:8px 12px;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03)}
tr:hover td{background:rgba(201,168,124,.02)}

/* === RANKING === */
.rank-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.rank-box{background:var(--bg2);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);padding:16px}
.rank-box h4{font-size:13px;color:var(--gold);margin-bottom:10px}
.ri{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.02)}
.rp{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.r1{background:linear-gradient(135deg,#c9a87c,#e8c898);color:#0a0a0f}
.r2{background:rgba(192,192,192,.15);color:#bbb}
.r3{background:rgba(180,130,80,.15);color:#c9a87c}
.rbar{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.rbar-f{height:100%;border-radius:3px}
.rn{font-size:11px;min-width:80px}.rv{font-size:11px;color:var(--text2);min-width:40px;text-align:right}

/* === BAR CHART === */
.bchart{display:flex;align-items:flex-end;gap:5px;height:140px;padding-top:16px}
.bcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bbar{width:100%;border-radius:3px 3px 0 0;transition:height .5s ease;min-height:1px}
.blbl{font-size:8px;color:var(--text3)}
.bval{font-size:9px;color:var(--text2)}

/* === PRICING === */
.price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.price-card{background:var(--bg2);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);padding:16px;text-align:center;transition:all .3s}
.price-card:hover{border-color:rgba(201,168,124,.2);transform:translateY(-2px)}
.price-card .pname{font-size:16px;font-weight:600;color:var(--gold);margin-bottom:4px}
.price-card .ptime{font-size:24px;font-weight:700;margin-bottom:2px}
.price-card .pprice{font-size:14px;color:var(--gold2);margin-bottom:10px}
.price-card .plist{font-size:10px;color:var(--text3);text-align:left;line-height:1.8}
.price-card .plist span{display:block;padding-left:12px;position:relative}
.price-card .plist span::before{content:'✦';position:absolute;left:0;color:var(--gold3);font-size:8px}

/* === STORE === */
.store-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.store-card{background:var(--bg2);border:1px solid rgba(255,255,255,.05);border-radius:var(--radius);padding:20px}
.store-card h4{font-size:15px;color:var(--gold);margin-bottom:10px}
.store-card .si{font-size:12px;color:var(--text2);margin-bottom:4px}
.store-card .si b{color:var(--text);font-weight:500}

/* Responsive */
@media(max-width:768px){
  .cards{grid-template-columns:1fr}
  .overview{grid-template-columns:repeat(2,1fr)}
  .header-inner{flex-direction:column;align-items:flex-start;gap:8px}
  .rank-grid,.price-grid,.store-cards{grid-template-columns:1fr}
}
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card,.stat,.rank-box,.tbl-wrap,.price-card,.store-card{animation:fu .4s ease both}
</style>
</head>

// Heatmap color
function hc(v,mx){
  if(!mx||!v)return'rgba(255,255,255,.02)';
  const r=v/mx;
  if(r<.2)return'rgba(201,168,124,.1)';
  if(r<.4)return'rgba(201,168,124,.22)';
  if(r<.6)return'rgba(201,168,124,.38)';
  if(r<.8)return'rgba(201,168,124,.55)';
  return'rgba(201,168,124,.75)';
}

let curStore='全て';
function rCards(){
  const fl=curStore==='全て'?D.therapists:D.therapists.filter(t=>t.store===curStore);

  let h=`<div class="filter-bar">${['全て',...stores].map(s=>`<button class="fbtn ${s===curStore?'on':''}" onclick="curStore='${s}';rCards()">${s} (${s==='全て'?D.therapists.length:D.therapists.filter(t=>t.store===s).length})</button>`).join('')}</div>`;
  h+='<div class="cards">'+fl.map((t,i)=>{
    const mx=Math.max(...t.weekday_dist,1);
    const heat=t.weekday_dist.map((v,d)=>`<div class="heat-cell" data-tip="${DJ[d]}:${v}日" style="background:${hc(v,mx)}"></div>`).join('');
    const lbls=DJ.map(d=>`<span class="heat-lbl">${d}</span>`).join('');
    let bdg='';
    if(t.new)bdg+='<span class="bdg bdg-new">NEW</span>';

    if(t.freq_per_week>=4)bdg+='<span class="bdg bdg-hot">常連</span>';
    return`<div class="card" style="animation-delay:${i*.03}s">
      <div class="c-top">
        ${t.image?`<img class="c-img" src="${t.image}" loading="lazy">`:'<div class="c-img"></div>'}
        <div class="c-info">
          <div class="c-name">${t.name}</div>
          <div class="c-store">${t.store}${t.stores_worked.length>1?' (+他店)':''}</div>
          <div class="c-badges">${bdg}</div>
          <div class="c-desc">${(t.description||'').replace(/\n/g,' ')}</div>
        </div>
      </div>
      <div class="c-stats">
        <div class="cs"><span class="v">${t.total_days}</span><span class="l">出勤日数</span></div>
        <div class="cs"><span class="v">${t.avg_hours}h</span><span class="l">平均勤務</span></div>
        <div class="cs"><span class="v">${t.freq_per_week}</span><span class="l">回/週</span></div>

      <div class="c-heat"><div class="heat-row">${lbls}</div><div class="heat-row" style="margin-top:3px">${heat}</div></div>
      <div class="c-foot"><div>入店 <span class="val">${t.enroll_date||'—'}</span></div><div>店舗 <span class="val">${t.stores_worked.join(', ')}</span></div></div>
    </div>`;
  }).join('')+'</div>';
  document.getElementById('p-therapists').innerHTML=h;
}

(function(){
  const p=document.getElementById('p-schedule');
  const wk=D.week_apr18;
  const dates=Object.keys(wk).sort();
  
  let h=`<div class="section-title">🔮 4/18(土) 出勤予測 — 過去データ分析</div>
  <p style="color:var(--text3);font-size:12px;margin-bottom:16px">4/18のスケジュールは公開前です。過去6ヶ月の土曜出勤パターンから出勤確率を推定しています。</p>`;
  
  // 土曜予測
  const preds=D.therapists.filter(t=>t.total_days>10).map(t=>{
    const satRate=t.weekday_dist[5]/Math.max(1,t.total_days)*100;
    return{...t,satRate,satCount:t.weekday_dist[5]};
  }).sort((a,b)=>b.satRate-a.satRate);
  
  h+=`<div class="tbl-wrap"><h4>🏷️ 土曜出勤確率ランキング（在籍中・出勤10日以上）</h4><table><thead><tr><th>#</th><th>セラピスト</th><th>店舗</th><th style="text-align:center">土曜出勤率</th><th style="text-align:center">土曜回数</th><th style="text-align:center">全出勤</th><th>予測</th></tr></thead><tbody>`+
  preds.map((t,i)=>{
    const lvl=t.satRate>=20?'🟢 高い':t.satRate>=12?'🟡 中':t.satRate>=5?'🔵 低め':'⚪ 稀';
    const bar=`<div style="width:${Math.min(t.satRate*3,100)}px;height:4px;background:var(--gold);border-radius:2px;margin-top:2px"></div>`;
    return`<tr><td>${i+1}</td><td style="font-weight:500">${t.name.split(' ')[0]}</td><td style="color:var(--text3)">${t.store}</td><td style="text-align:center"><span class="mono">${t.satRate.toFixed(1)}%</span>${bar}</td><td class="mono" style="text-align:center">${t.satCount}</td><td class="mono" style="text-align:center">${t.total_days}</td><td>${lvl}</td></tr>`;
  }).join('')+'</tbody></table></div>';

  // 店舗別の土曜パターン
  const storeMap={};
  preds.forEach(t=>{
    if(!storeMap[t.store])storeMap[t.store]={total:0,count:0};
    storeMap[t.store].total+=t.satRate;
    storeMap[t.store].count++;
  });

  h+=`<div class="section-title">🏪 店舗別 土曜日の平均出勤人数</div><div class="rank-grid">`;
  Object.entries(storeMap).filter(([s])=>s!=='本部').forEach(([store,d])=>{
    const avgPeople=preds.filter(t=>t.store===store&&t.satRate>=10).length;
    h+=`<div class="rank-box"><h4>${store}</h4><p style="font-size:28px;font-weight:700;color:var(--gold)">${avgPeople}〜${avgPeople+2}名</p><p style="font-size:11px;color:var(--text3);margin-top:4px">予想出勤数（土曜出勤率10%以上）</p></div>`;
  });
  h+='</div>';

  // 公開済みスケジュール
  if(dates.length>0){
    h+=`<div class="section-title">📅 公開済みスケジュール (4/13〜)</div><div class="tbl-wrap"><table><thead><tr><th>日付</th><th>セラピスト</th><th>店舗</th><th>時間</th></tr></thead><tbody>`+
    dates.flatMap(d=>wk[d].map(s=>`<tr><td class="mono">${d}</td><td style="font-weight:500">${s.name}</td><td style="color:var(--text3)">${s.store}</td><td class="mono">${s.from}〜${s.to}</td></tr>`)).join('')+
    '</tbody></table></div>';
  }

  p.innerHTML=h;
})();

  h+='</div>';

  // セラピスト別 ヒートマップ
  const top10=D.therapists.filter(t=>t.total_days>20).slice(0,10);
  h+=`<div class="section-title">👤 セラピスト別 月間出勤推移</div><div class="tbl-wrap"><table><thead><tr><th>名前</th>${months.map(m=>'<th style="text-align:center;font-size:9px">'+m.slice(5)+'</th>').join('')}<th style="text-align:right">計</th></tr></thead><tbody>`+
  top10.map(t=>{
    const mx=Math.max(...Object.values(t.monthly||{}),1);
    return`<tr><td style="font-weight:500;white-space:nowrap">${t.name.split(' ')[0]}</td>${months.map(m=>{
      const v=(t.monthly||{})[m]||0;
      return`<td style="text-align:center"><span style="display:inline-block;min-width:22px;padding:1px 3px;border-radius:3px;background:${hc(v,mx)};font-size:10px">${v||''}</span></td>`;
    }).join('')}<td style="text-align:right;font-weight:700;color:var(--gold)">${t.total_days}</td></tr>`;
  }).join('')+'</tbody></table></div>';
  p.innerHTML=h;
})();

// === PRICING ===
(function(){
  const p=document.getElementById('p-pricing');
  let h=`<div class="section-title">💰 コース料金</div><div class="price-grid">`+
  (D.courses||[]).map(c=>
    `<div class="price-card"><div class="pname">${c.name}</div><div class="ptime">${c.min}<span style="font-size:14px;font-weight:400"> min</span></div><div class="pprice">¥${c.price.toLocaleString()}<span style="font-size:11px;color:var(--text3)"> (税込)</span></div><div class="plist">${c.services.map(s=>`<span>${s}</span>`).join('')}</div></div>`
  ).join('')+'</div>';

  h+=`<div class="section-title" style="margin-top:24px">🔧 オプション</div><div class="rank-grid">`;
  h+=`<div class="rank-box"><h4>基本オプション</h4>`;
  (D.options||[]).forEach(o=>{h+=`<div class="ri"><span class="rn">${o.name}</span><span class="rv mono" style="color:var(--gold)">¥${o.price.toLocaleString()}</span></div>`;});
  h+='</div>';
  h+=`<div class="rank-box"><h4>+¥2,000 オプション</h4>`;
  (D.options_2000||[]).forEach(o=>{h+=`<div class="ri"><span class="rn">${o}</span></div>`;});
  h+='</div>';
  h+=`<div class="rank-box"><h4>+¥1,000 オプション</h4>`;
  (D.options_1000||[]).forEach(o=>{h+=`<div class="ri"><span class="rn">${o}</span></div>`;});
  h+='</div></div>';

  h+=`<p style="color:var(--text3);font-size:11px;margin-top:16px">※ 180分以上のロングコースも用意あり。営業時間: 10:00〜翌5:00</p>`;
  p.innerHTML=h;
})();

// === STORES ===
(function(){
  const p=document.getElementById('p-stores');
  const sd=D.store_details||{};
  
  // 店舗別在籍数
  const storeCounts={};
  D.therapists.forEach(t=>{storeCounts[t.store]=(storeCounts[t.store]||0)+1;});

  let h='<div class="section-title">🏠 店舗詳細</div><div class="store-cards">'+
  Object.entries(sd).map(([name,info])=>{
    const cnt=storeCounts[name]||0;
    const avgDays=D.therapists.filter(t=>t.store===name);
    const avgD=avgDays.length?Math.round(avgDays.reduce((s,t)=>s+t.total_days,0)/avgDays.length):0;
    return`<div class="store-card">
      <h4>${name}</h4>
      <div class="si"><b>TEL:</b> <a href="tel:${info.tel}">${info.tel}</a></div>
      <div class="si"><b>住所:</b> ${info.address}</div>
      <div class="si"><b>アクセス:</b> ${info.access}</div>
      <div class="si"><b>営業:</b> 10:00〜翌5:00</div>
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05)">
        <div class="si"><b>在籍:</b> ${cnt}名</div>
        <div class="si"><b>平均出勤日数:</b> ${avgD}日（集計期間内）</div>
      </div>
      <a href="${info.map}" target="_blank" style="display:inline-block;margin-top:10px;padding:6px 16px;border:1px solid var(--gold3);border-radius:20px;font-size:11px">📍 Google Map</a>
    </div>`;
  }).join('')+'</div>';
  p.innerHTML=h;
})();
</script>
</body>
</html>
