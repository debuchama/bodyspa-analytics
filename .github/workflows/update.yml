name: Update Dashboard Data

on:
  schedule:
    # JST 6:00 (UTC 21:00 前日) に毎日実行
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Collect data from Sanity CMS
        run: python scripts/collect_data.py

      - name: Generate dashboard data
        run: python scripts/export_data.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || (git commit -m "chore: update dashboard $(TZ=Asia/Tokyo date +%Y-%m-%d)" && git push)
